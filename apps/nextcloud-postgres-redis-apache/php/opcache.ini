; =============================================================================
; PHP OPcache + JIT Tuning for Nextcloud (Apache image)
; =============================================================================
; This file is mounted into the container via volume:
;   - ./php/opcache.ini:/usr/local/etc/php/conf.d/opcache-custom.ini:ro
;
; Why OPcache?
;   Without OPcache, PHP recompiles all .php files on EVERY request.
;   OPcache stores compiled bytecode in RAM → 3–5x faster response times.
;   Nextcloud 31 has ~10,000+ PHP files → OPcache is critical.
; =============================================================================

[opcache]
opcache.enable=1
opcache.enable_cli=1

; Amount of RAM reserved for compiled PHP bytecode (MB)
; Nextcloud 31: minimum 128 MB, recommended 256 MB
; Too small → OPcache fills up → files are not cached → slow performance
opcache.memory_consumption=256

; Deduplication of string literals in RAM
; Saves approximately 10–20% of OPcache memory
opcache.interned_strings_buffer=16

; Maximum number of cached PHP files
; Nextcloud has >10,000 PHP files → do not set this too low
opcache.max_accelerated_files=20000

; How often PHP checks whether files changed on disk (seconds)
; 0 = always check (development only), 60 = once per minute
; After Nextcloud updates, restarting the container forces revalidation
opcache.revalidate_freq=60

; PHP 8.x JIT compiler: can reduce CPU usage by ~15–20% for compute-heavy workloads
; "tracing" = most aggressive and usually most effective JIT strategy
opcache.jit=tracing
opcache.jit_buffer_size=128M

; Keep comments in bytecode
; Required by some applications and frameworks
opcache.save_comments=1

; Write OPcache errors to Docker stdout / stderr
opcache.error_log=/proc/self/fd/2

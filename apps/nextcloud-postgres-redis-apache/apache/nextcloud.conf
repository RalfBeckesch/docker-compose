# =============================================================================
# Apache2 VirtualHost Configuration for Nextcloud
# =============================================================================
# Mounted via volume:
#   - ./apache/nextcloud.conf:/etc/apache2/sites-available/000-default.conf:ro
#
# Optimisations:
#   - KeepAlive: reuse connections (fewer TCP handshakes)
#   - Compression via mod_deflate
#   - Caching headers for static assets
#   - Security headers for safer default behaviour
# =============================================================================

# Enable KeepAlive globally (disabled by default in the nextcloud:apache image)
# Allows multiple HTTP requests over a single TCP connection → less overhead
# Especially important for desktop sync clients that send many small requests
KeepAlive On
KeepAliveTimeout 5
MaxKeepAliveRequests 100

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    # Route logs to Docker stdout / stderr
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined

    # mod_deflate: compression for text-based responses
    # Reduces transfer size for JS / CSS / HTML by ~70%
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml
        AddOutputFilterByType DEFLATE text/css text/javascript
        AddOutputFilterByType DEFLATE application/javascript application/json
        AddOutputFilterByType DEFLATE application/xml application/rss+xml
        AddOutputFilterByType DEFLATE image/svg+xml font/ttf font/otf
    </IfModule>

    # mod_expires: browser caching for static assets
    # Prevents unnecessary re-downloads on repeated page loads
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpg              "access plus 1 month"
        ExpiresByType image/png              "access plus 1 month"
        ExpiresByType image/gif              "access plus 1 month"
        ExpiresByType image/svg+xml          "access plus 1 month"
        ExpiresByType text/css               "access plus 1 week"
        ExpiresByType application/javascript "access plus 1 week"
        ExpiresByType font/ttf               "access plus 1 month"
        ExpiresByType font/woff2             "access plus 1 month"
    </IfModule>

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        # AllowOverride All is required so that Nextcloud can manage its own
        # rewrite rules through .htaccess → no manual rewrite configuration
        # needed and less risk of redirect loops
        Require all granted
    </Directory>

    # Security headers
    <IfModule mod_headers.c>
        Header always set Referrer-Policy "no-referrer"
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set X-Permitted-Cross-Domain-Policies "none"
        Header always set X-Robots-Tag "noindex, nofollow"
        Header always set X-XSS-Protection "1; mode=block"
        Header unset X-Powered-By
    </IfModule>

</VirtualHost>
